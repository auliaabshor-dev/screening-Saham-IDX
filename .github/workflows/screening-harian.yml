name: Screening Harian IDX

on:
  schedule:
    # Jadwal dalam UTC (WIB = UTC+7). Hanya hari kerja (Senin-Jumat).
    - cron: "45 2 * * 1-5"   # 09:45 WIB — sesi PAGI  (Swing + BPJS)
    - cron: "15 5 * * 1-5"   # 12:15 WIB — sesi SIANG (Swing / update)
    - cron: "30 9 * * 1-5"   # 16:30 WIB — sesi SORE  (Swing + BSJP)
  workflow_dispatch: {}      # tombol "Run workflow" manual

permissions:
  contents: write

jobs:
  screening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Jalankan screening
        # Sesi (pagi/siang/sore) terdeteksi otomatis dari jam WIB
        run: python idx_screening.py

      - name: Commit hasil signals.json
        run: |
          git config user.name "screening-bot"
          git config user.email "actions@github.com"
          git pull --rebase
          git add signals.json
          git diff --cached --quiet || git commit -m "Update sinyal $(TZ=Asia/Jakarta date +'%Y-%m-%d %H:%M WIB')"
          git push
