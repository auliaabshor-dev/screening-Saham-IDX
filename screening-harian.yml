name: Screening Harian IDX

on:
  schedule:
    # 09:30 UTC = 16:30 WIB — setelah pasar IDX tutup (15:50 WIB).
    # Hanya hari kerja (Senin–Jumat). Catatan: cron GitHub pakai UTC.
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}   # tombol "Run workflow" manual di tab Actions

permissions:
  contents: write   # izin untuk commit signals.json kembali ke repo

jobs:
  screening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Jalankan screening
        run: python idx_screening.py

      - name: Commit hasil signals.json
        run: |
          git config user.name "screening-bot"
          git config user.email "actions@github.com"
          git add signals.json
          # Commit hanya jika ada perubahan
          git diff --cached --quiet || git commit -m "Update sinyal $(date -u +'%Y-%m-%d')"
          git push
